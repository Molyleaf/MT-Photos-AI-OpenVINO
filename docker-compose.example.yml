services:
  mt-photos-ai-openvino:
    # 请先在本地构建或从镜像仓库拉取该镜像；compose 不负责运行时构建。
    image: mt-photos-ai-openvino:latest
    container_name: mt-photos-ai-openvino
    init: true
    security_opt:
      - no-new-privileges:true
    ports:
      - "8060:8060"
    group_add:
      # Debian 默认通常是 video=44、render=109。
      # 如果宿主机 GID 不同，直接修改下面两个值。
      - "44"
      - "109"
    environment:
      API_AUTH_KEY: "mt_photos_ai_extra"
      CLIP_IMAGE_BATCH: "8"
      CLIP_INFERENCE_DEVICE: "AUTO"
      INFERENCE_DEVICE: "AUTO"
      INSIGHTFACE_OV_DEVICE: "AUTO"
      LOG_LEVEL: "WARNING"
      NON_TEXT_IDLE_RELEASE_SECONDS: "60"
      OCR_EXEC_TIMEOUT: "30"
      PORT: "8060"
      RAPIDOCR_DEVICE: "CPU"
    devices:
      # Linux 容器访问 Intel iGPU 时需要映射 /dev/dri。
      - /dev/dri:/dev/dri
    restart: unless-stopped

  mt-photos-ai-text-clip:
    # Text-CLIP 独立容器固定走 CPU，模型在进程生命周期内常驻内存。
    image: mt-photos-ai-text-clip:latest
    container_name: mt-photos-ai-text-clip
    init: true
    security_opt:
      - no-new-privileges:true
    ports:
      - "8061:8061"
    environment:
      API_AUTH_KEY: "mt_photos_ai_extra"
      LOG_LEVEL: "WARNING"
      PORT: "8061"
    restart: unless-stopped
