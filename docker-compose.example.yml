services:
  mt-photos-ai-openvino:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.zju.edu.cn/pypi/web/simple}
    container_name: mt-photos-ai-openvino
    init: true
    security_opt:
      - no-new-privileges:true
    ports:
      - "8060:8060"
    volumes:
      # Persist local models and mount RapidOCR OpenVINO config.
      - ./models:/models
      - ./app/config/cfg_openvino_cpu.yaml:/app/config/cfg_openvino_cpu.yaml:ro
    group_add:
      # Debian defaults are usually video=44, render=109.
      - "${VIDEO_GID:-44}"
      - "${RENDER_GID:-109}"
    environment:
      # --- IMPORTANT ---
      # SET YOUR SECRET API KEY HERE
      - API_AUTH_KEY=your_secret_key_change_me

      # --- INFERENCE DEVICE ---
      # Options: "CPU", "GPU", "AUTO", "AUTO:GPU,CPU"
      # "AUTO:GPU,CPU" will prioritize GPU and fallback to CPU.
      - INFERENCE_DEVICE=GPU
      - WEB_CONCURRENCY=2
      - INFERENCE_QUEUE_MAX_SIZE=64
      - TEXT_CLIP_BATCH_SIZE=8
      - TEXT_MODEL_RESTORE_DELAY_MS=5000
      - OV_CACHE_DIR=/models/cache/openvino
      - LIBVA_DRIVER_NAME=iHD
      - RAPIDOCR_OPENVINO_CONFIG_PATH=/app/config/cfg_openvino_cpu.yaml
      - RAPIDOCR_MODEL_DIR=/models/rapidocr
    devices:
      # This is required to give the container access to the host's GPU (iGPU).
      # On Linux, this is typically /dev/dri.
      - /dev/dri:/dev/dri
    restart: unless-stopped
