services:
  mt-photos-ai-openvino:
    # 按需替换为你实际发布的镜像标签。
    image: mt-photos-ai-openvino:latest
    container_name: mt-photos-ai-openvino
    init: true
    security_opt:
      - no-new-privileges:true
    ports:
      - "8060:8060"
    group_add:
      # Debian 默认通常是 video=44、render=109。
      # 如果宿主机 GID 不同，直接修改下面两个值。
      - "44"
      - "109"
    environment:
      # 未列出的变量要么是兼容/内部项，要么已由镜像固定，通常不需要覆盖。
      API_AUTH_KEY: "mt_photos_ai_extra"
      INFERENCE_DEVICE: "AUTO"
      CLIP_INFERENCE_DEVICE: "AUTO"
      MODEL_PATH: "/models"
      WEB_CONCURRENCY: "2"
      INFERENCE_QUEUE_MAX_SIZE: "64"
      TEXT_CLIP_BATCH_SIZE: "8"
      INFERENCE_TASK_TIMEOUT: "120"
      TEXT_MODEL_RESTORE_DELAY_MS: "2000"
      OV_CACHE_DIR: "/models/cache/openvino"
      RAPIDOCR_OPENVINO_CONFIG_PATH: "/app/config/cfg_openvino_cpu.yaml"
      RAPIDOCR_MODEL_DIR: "/models/rapidocr"
      RAPIDOCR_FONT_PATH: ""
      RAPIDOCR_DEVICE: "MULTI:GPU,CPU"
      RAPIDOCR_INFERENCE_NUM_THREADS: "-1"
      RAPIDOCR_PERFORMANCE_HINT: "LATENCY"
      RAPIDOCR_PERFORMANCE_NUM_REQUESTS: "-1"
      RAPIDOCR_ENABLE_CPU_PINNING: "true"
      RAPIDOCR_NUM_STREAMS: "-1"
      RAPIDOCR_ENABLE_HYPER_THREADING: "true"
      RAPIDOCR_SCHEDULING_CORE_TYPE: "ANY_CORE"
      RAPIDOCR_USE_CLS: "true"
      RAPIDOCR_MAX_SIDE_LEN: "960"
      RAPIDOCR_DET_LIMIT_SIDE_LEN: "960"
      RAPIDOCR_REC_BATCH_NUM: "6"
      RAPIDOCR_CLS_BATCH_NUM: "6"
      INSIGHTFACE_OV_DEVICE: "MULTI:GPU,CPU"
      OPENCV_OPENCL_DEVICE: "Intel:GPU:0"
      LOG_LEVEL: "WARNING"
    devices:
      # Linux 容器访问 Intel iGPU 时需要映射 /dev/dri。
      - /dev/dri:/dev/dri
    restart: unless-stopped
